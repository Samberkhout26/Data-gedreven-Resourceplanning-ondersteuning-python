# Lokaal testen van de pipeline in Docker
# Vereist: Docker Desktop + Prefect Cloud account (of lokale Prefect server)
#
# Gebruik:
#   docker compose up --build          # worker starten
#   docker compose run pipeline        # pipeline eenmalig draaien

services:
  worker:
    build: .
    env_file: .env
    volumes:
      - ./data:/app/data
      - ./models:/app/models
    command: prefect worker start --pool rister-pool
    restart: unless-stopped

  pipeline:
    build: .
    env_file: .env
    volumes:
      - ./data:/app/data
      - ./models:/app/models
    command: python src/flows/pipeline_flow.py
    profiles:
      - run  # alleen starten via: docker compose --profile run up pipeline
