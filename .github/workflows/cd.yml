name: CD — Azure ML pipeline

on:
  push:
    branches: ["main"]
  workflow_dispatch:   # handmatig starten via GitHub UI

# Vereiste secrets (instellen via GitHub → Settings → Secrets and variables → Actions):
#   AZURE_CREDENTIALS          — service principal JSON (zie README)
#   AML_SUBSCRIPTION_ID        — Azure subscription ID
#   AML_RESOURCE_GROUP         — rister-ml
#   AML_WORKSPACE              — rister-aml
#   AZURE_STORAGE_CONNECTION_STRING — voor WerkExpert Blob upload

jobs:
  submit-pipeline:
    name: Submit Azure ML pipeline
    runs-on: ubuntu-latest
    # Alleen uitvoeren als de secrets beschikbaar zijn (niet leeg)
    if: vars.AML_SECRETS_CONFIGURED == 'true'

    steps:
      - uses: actions/checkout@v4

      - name: Azure inloggen
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Python 3.11 instellen
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
          cache-dependency-path: requirements.txt

      - name: Dependencies installeren
        run: pip install azure-ai-ml azure-identity mlflow pandas numpy

      - name: Azure ML pipeline submitten
        env:
          AML_SUBSCRIPTION_ID: ${{ secrets.AML_SUBSCRIPTION_ID }}
          AML_RESOURCE_GROUP: ${{ secrets.AML_RESOURCE_GROUP }}
          AML_WORKSPACE: ${{ secrets.AML_WORKSPACE }}
        run: python src/aml/pipeline.py

      - name: Azure uitloggen
        if: always()
        run: az logout
