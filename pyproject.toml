[tool.ruff]
line-length = 100
target-version = "py311"

[tool.ruff.lint]
select = ["E", "F", "W", "I"]
ignore = [
    "E501",   # line too long — al afgedekt door line-length
    "F401",   # unused import in __init__ files
]

[tool.pytest.ini_options]
testpaths = ["tests"]
python_files = ["test_*.py"]
